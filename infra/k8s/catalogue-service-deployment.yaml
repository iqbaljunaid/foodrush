---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue-service
  namespace: foodrush
  labels:
    app.kubernetes.io/name: catalogue-service
    app.kubernetes.io/part-of: foodrush
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: catalogue-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalogue-service
        app.kubernetes.io/part-of: foodrush
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: catalogue-service
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: catalogue-service
          image: ${REGION}.ocir.io/${TENANCY}/foodrush-prod/catalogue-service:latest
          ports:
            - name: http
              containerPort: 3002
              protocol: TCP
          env:
            - name: PORT
              value: "3002"
            - name: HOST
              value: "0.0.0.0"
          envFrom:
            - configMapRef:
                name: foodrush-config
            - secretRef:
                name: foodrush-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: catalogue-service
---
apiVersion: v1
kind: Service
metadata:
  name: catalogue-service
  namespace: foodrush
  labels:
    app.kubernetes.io/name: catalogue-service
    app.kubernetes.io/part-of: foodrush
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: catalogue-service
  ports:
    - name: http
      port: 3002
      targetPort: http
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: catalogue-service
  namespace: foodrush
  labels:
    app.kubernetes.io/name: catalogue-service
    app.kubernetes.io/part-of: foodrush
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: catalogue-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: catalogue-service
  namespace: foodrush
  labels:
    app.kubernetes.io/name: catalogue-service
    app.kubernetes.io/part-of: foodrush
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: catalogue-service
