## Secret values are wired from OCI Vault at deploy time.
## This template shows the expected keys; do NOT commit actual values.
## Use External Secrets Operator or OCI Vault CSI driver to inject.
apiVersion: v1
kind: Secret
metadata:
  name: foodrush-secrets
  namespace: foodrush
  labels:
    app.kubernetes.io/part-of: foodrush
type: Opaque
stringData:
  # MySQL credentials (shared by order-service, payment-service)
  MYSQL_HOST: ""
  MYSQL_USER: ""
  MYSQL_PASSWORD: ""

  # Redis credentials (shared by dispatch-service, location-service)
  REDIS_HOST: ""
  REDIS_PASSWORD: ""

  # Kafka/OCI Streaming SASL credentials
  KAFKA_BROKERS: ""
  KAFKA_SASL_USERNAME: ""
  KAFKA_SASL_PASSWORD: ""

  # Stripe (payment-service)
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""

  # OCI credentials (catalogue-service, notification-service)
  OCI_COMPARTMENT_ID: ""
  OCI_REGION: ""
  OCI_TENANCY_ID: ""
  OCI_USER_ID: ""
  OCI_FINGERPRINT: ""
  OCI_PRIVATE_KEY_PATH: ""

  # OCI Object Storage (catalogue-service)
  OCI_OS_NAMESPACE: ""
  OCI_OS_BUCKET_NAME: ""
  OCI_NOSQL_ENDPOINT: ""

  # OCI Notification Service (notification-service)
  OCI_ONS_TOPIC_ID: ""
  OCI_EMAIL_SMTP_ENDPOINT: ""
  EMAIL_SENDER_ADDRESS: ""

  # User service / Auth
  JWT_SECRET: ""
  IDCS_CLIENT_ID: ""
  IDCS_CLIENT_SECRET: ""
  IDCS_DISCOVERY_URL: ""
