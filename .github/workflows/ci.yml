name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - catalogue-service
          - dispatch-service
          - location-service
          - notification-service
          - order-service
          - payment-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: ESLint
        working-directory: services/${{ matrix.service }}
        run: npm run lint

      - name: Prettier check
        working-directory: services/${{ matrix.service }}
        run: npx prettier --check "src/**/*.ts"

  typecheck:
    name: TypeScript Compilation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - catalogue-service
          - dispatch-service
          - location-service
          - notification-service
          - order-service
          - payment-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: TypeScript compile
        working-directory: services/${{ matrix.service }}
        run: npm run typecheck

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: tests/contract/package-lock.json

      - name: Install dependencies
        working-directory: tests/contract
        run: npm ci

      - name: Validate OpenAPI specs
        working-directory: tests/contract
        run: npm run validate

      - name: Run contract tests
        working-directory: tests/contract
        run: npm test

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    strategy:
      fail-fast: false
      matrix:
        service:
          - catalogue-service
          - dispatch-service
          - location-service
          - notification-service
          - order-service
          - payment-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: false
          tags: foodrush/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-contexts: |
            root=.

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - network
          - compute
          - security
          - data-stores/mysql
          - data-stores/nosql
          - data-stores/streaming
          - data-stores/cache
          - compute/ocir
          - compute/observability
          - compute/service-mesh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9'

      - name: Terraform init
        working-directory: infra/terraform/${{ matrix.module }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra/terraform/${{ matrix.module }}
        run: terraform validate

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4

      - name: Run tflint
        working-directory: infra/terraform/${{ matrix.module }}
        run: |
          tflint --init
          tflint

  terraform-edge:
    name: Terraform Validate (Edge)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - api-gateway
          - waf
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9'

      - name: Terraform init
        working-directory: edge/${{ matrix.module }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: edge/${{ matrix.module }}
        run: terraform validate

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4

      - name: Run tflint
        working-directory: edge/${{ matrix.module }}
        run: |
          tflint --init
          tflint

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [lint, typecheck, contract-tests, docker-build, terraform-validate, terraform-edge]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          RESULTS=("${{ needs.lint.result }}" "${{ needs.typecheck.result }}" \
                   "${{ needs.contract-tests.result }}" "${{ needs.docker-build.result }}" \
                   "${{ needs.terraform-validate.result }}" "${{ needs.terraform-edge.result }}")
          for result in "${RESULTS[@]}"; do
            if [ "$result" != "success" ]; then
              echo "::error::One or more CI jobs failed"
              exit 1
            fi
          done
          echo "All CI checks passed"
